<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<form method="post"> 
	<label for="name">Name</label>
		<input type="text" id="name" required="true"/>
		<br>
		<label for="email">Email</label>
		<input type="email" id="email" required="true"/>
		<br>
		<label for="gender">Gender</label>
		<input type="radio" id="male" name="gender" required="true"/>
		<label for="male">Male</label>
		<input type="radio" id="female" name="gender" required="true"/>
		<label for="female">Female</label>
		<br>
		<label for="laptop">Laptop Brands</label>
		<select id="laptop" name="laptop" placeholder="">
			<option value="apple">Apple</option>
			<option value="asus">Asus</option>
			<option value="hp">Hp</option>
		</select>
		<br>
		<label for="age">Age</label>
		<input type="number" id="age" required="true"/>
		<br>
		<label for="dob">Date of Birth</label>
		<input type="date" id="dob" required="true"/>
		<br>
		<label for="password">Password</label>
		<input type="password" id="password" required="true"/>
		<br>
		<label for="portfolio">Portfolio URL</label>
		<input type="url" id="portfolio"/>
		<br>
		<button type="submit">Submit</button>
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
